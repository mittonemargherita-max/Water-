<!DOCTYPE html>
<html lang="it">
<head>
  <base target="_top">
  <meta charset="utf-8">
  <style>
    :root {
      --orto: #2e7d32; --patr: #c2185b; --casa: #ef6c00; /* casa = arancione */
      --bordo: #e0e0e0;
    }
    * { box-sizing: border-box; }
    body { font-family: -apple-system, Roboto, Arial, sans-serif; margin: 0;
           background: #fafafa; color: #222; }
    header { background: var(--orto); color: #fff; padding: 14px 16px; }
    header h1 { margin: 0; font-size: 18px; }
    main { max-width: 680px; margin: 0 auto; padding: 8px; }

    .mese { display: flex; align-items: center; justify-content: space-between;
            padding: 6px 4px; }
    .mese .nome { font-size: 17px; font-weight: 700; text-transform: capitalize; }
    .mese button { border: 1px solid var(--bordo); background: #fff; border-radius: 8px;
                   width: 40px; height: 36px; font-size: 18px; cursor: pointer; }
    .mese button:disabled { opacity: .3; cursor: default; }

    .settimana, .griglia { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
    .settimana { margin: 4px 0; }
    .settimana div { text-align: center; font-size: 11px; color: #888; font-weight: 600; }

    .cella { background: #fff; border: 1px solid var(--bordo); border-radius: 8px;
             min-height: 92px; padding: 4px; display: flex; flex-direction: column; gap: 2px; }
    .cella.vuota { background: transparent; border: none; }
    .cella.fuori { background: #f7f7f7; color: #bbb; }
    .cella.oggi { border: 2px solid var(--orto); }
    .num-row { display: flex; justify-content: space-between; align-items: baseline; }
    .num { font-weight: 700; font-size: 13px; }
    .pio { font-size: 10px; color: #1565c0; font-weight: 600; }

    .riga-chk { display: flex; align-items: center; gap: 4px; }
    .riga-chk.clic { cursor: pointer; }
    .chk { width: 17px; height: 17px; border-radius: 4px; border: 2px solid #bbb;
           display: flex; align-items: center; justify-content: center; flex-shrink: 0;
           font-size: 12px; color: #fff; line-height: 1; }
    .chk.casa { border-color: var(--casa); }  .chk.casa.on { background: var(--casa); }
    .chk.orto { border-color: var(--orto); }  .chk.orto.on { background: var(--orto); }
    .chk.patr { border-color: var(--patr); }  .chk.patr.on { background: var(--patr); }
    .lbl { font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .casa .lbl { color: var(--casa); }
    .orto .lbl { color: var(--orto); }
    .patr .lbl { color: var(--patr); }
    .rip-lbl { font-size: 11px; color: #1565c0; font-weight: 600; }

    .legenda { font-size: 12px; color: #777; margin-top: 12px; text-align: center; line-height: 1.8; }
    .legenda span { display: inline-block; margin: 0 6px; }
    .legenda i { display: inline-block; width: 11px; height: 11px; border-radius: 3px;
                 vertical-align: middle; margin-right: 3px; }
    #loader { text-align: center; color: #999; padding: 30px; }
  </style>
</head>
<body>
  <header><h1>Bagnature Orto</h1></header>
  <main>
    <div id="loader">Carico…</div>
    <div id="app" style="display:none">
      <div class="mese">
        <button id="prev">‹</button>
        <div class="nome" id="nomemese"></div>
        <button id="next">›</button>
      </div>
      <div class="settimana">
        <div>Lun</div><div>Mar</div><div>Mer</div><div>Gio</div>
        <div>Ven</div><div>Sab</div><div>Dom</div>
      </div>
      <div class="griglia" id="griglia"></div>
      <div class="legenda">
        <span><i style="background:#2e7d32"></i>Orto</span>
        <span><i style="background:#c2185b"></i>Patricio</span>
        <span><i style="background:#ef6c00"></i>Casa (ogni giorno)</span>
        <br>
        <span><i style="background:#90caf9"></i>sfondo blu = pioggia probabile</span>
        <span><i style="background:#cfcfcf"></i>sfondo grigio = previsione non ancora affidabile</span>
      </div>
    </div>
  </main>

  <script>
    var MESI = ['gennaio','febbraio','marzo','aprile','maggio','giugno','luglio',
      'agosto','settembre','ottobre','novembre','dicembre'];
    var CL = { Orto:'orto', Patricio:'patr', Casa:'casa' };
    var LAB = { Casa:'Casa', Orto:'Orto', Patricio:'Patr.' };

    var DATI = null;
    var meseCorr = null; // {y, m}  (m 0-11)

    function carica() {
      google.script.run.withSuccessHandler(function (d) {
        DATI = d;
        document.getElementById('loader').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        if (!meseCorr) {
          var t = (!d.min || d.today >= d.min) ? d.today : d.min;
          meseCorr = { y: +t.slice(0,4), m: +t.slice(5,7) - 1 };
        }
        render();
      }).getCalendario();
    }

    function pad(n){ return (n<10?'0':'')+n; }
    function iso(y,m,d){ return y+'-'+pad(m+1)+'-'+pad(d); }
    function meseKey(y,m){ return y+'-'+pad(m+1); }
    function fuori(tipo){ return tipo==='Orto'||tipo==='Patricio'||tipo==='Riposo'; }

    function render() {
      document.getElementById('nomemese').textContent = MESI[meseCorr.m] + ' ' + meseCorr.y;

      var minK = DATI.min ? DATI.min.slice(0,7) : meseKey(meseCorr.y,meseCorr.m);
      var maxK = DATI.max ? DATI.max.slice(0,7) : meseKey(meseCorr.y,meseCorr.m);
      var curK = meseKey(meseCorr.y, meseCorr.m);
      document.getElementById('prev').disabled = curK <= minK;
      document.getElementById('next').disabled = curK >= maxK;

      var y = meseCorr.y, m = meseCorr.m;
      var primo = new Date(Date.UTC(y, m, 1));
      var off = (primo.getUTCDay() + 6) % 7;            // Lun=0
      var giorniMese = new Date(Date.UTC(y, m+1, 0)).getUTCDate();

      var g = document.getElementById('griglia');
      g.innerHTML = '';
      for (var i = 0; i < off; i++) { var v=document.createElement('div'); v.className='cella vuota'; g.appendChild(v); }
      for (var d = 1; d <= giorniMese; d++) g.appendChild(cella(iso(y,m,d), d));
    }

    function alphaPioggia(prob) {
      if (prob === '' || prob <= 20) return 0;
      return Math.min(0.55, (prob - 20) / 80 * 0.55);
    }

    function cella(isoG, d) {
      var c = document.createElement('div');
      var ev = DATI.giorni[isoG];
      if (!ev) { c.className='cella fuori'; c.innerHTML='<div class="num-row"><span class="num">'+d+'</span></div>'; return c; }

      c.className = 'cella' + (isoG === DATI.today ? ' oggi' : '');
      var f = ev.filter(function(e){ return fuori(e.tipo); })[0];
      var casa = ev.filter(function(e){ return e.tipo==='Casa'; })[0];

      var prob = f && f.prob !== '' ? +f.prob : '';
      if (prob === '') {
        // nessuna previsione affidabile (oltre la finestra MeteoSvizzera)
        c.style.backgroundColor = 'rgba(120,120,120,0.16)';
      } else {
        var a = alphaPioggia(prob);
        if (a > 0) c.style.backgroundColor = 'rgba(33,150,243,' + a.toFixed(2) + ')';
      }

      var pio = (prob !== '') ? '<span class="pio">'+prob+'%</span>' : '';
      var h = '<div class="num-row"><span class="num">'+d+'</span>'+pio+'</div>';
      if (casa) h += rigaChk(isoG, 'Casa', casa.fatto);          // niente pioggia% per la casa
      if (f) {
        if (f.tipo === 'Riposo') h += '<div class="riga-chk"><span class="rip-lbl">Pioggia</span></div>';
        else h += rigaChk(isoG, f.tipo, f.fatto);
      }
      c.innerHTML = h;
      return c;
    }

    function rigaChk(isoG, tipo, fatto) {
      var cls = CL[tipo];
      return '<div class="riga-chk clic ' + cls + '" '
        + 'onclick="toggle(\''+isoG+'\',\''+tipo+'\','+(!fatto)+')">'
        + '<span class="chk '+cls+(fatto?' on':'')+'">'+(fatto?'✓':'')+'</span>'
        + '<span class="lbl">'+LAB[tipo]+'</span></div>';
    }

    function toggle(isoG, tipo, val) {
      // aggiornamento ottimistico: cambio subito a schermo, salvo in sottofondo
      var ev = DATI.giorni[isoG] || [];
      for (var i = 0; i < ev.length; i++) if (ev[i].tipo === tipo) ev[i].fatto = val;
      render();
      avviaPoll(); // rimanda il prossimo refresh, evita che "torni indietro"
      google.script.run.segnaFatto(isoG, tipo, val);
    }

    document.getElementById('prev').onclick = function(){
      meseCorr.m--; if (meseCorr.m < 0){ meseCorr.m = 11; meseCorr.y--; } render();
    };
    document.getElementById('next').onclick = function(){
      meseCorr.m++; if (meseCorr.m > 11){ meseCorr.m = 0; meseCorr.y++; } render();
    };

    var pollTimer = null;
    function avviaPoll() {
      if (pollTimer) clearInterval(pollTimer);
      pollTimer = setInterval(carica, 30000);
    }

    carica();
    avviaPoll();
  </script>
</body>
</html>
