name: Aggiorna calendario bagnature

# DISATTIVATO: il sistema attivo e' ora Google Apps Script (cartella apps-script/).
# Questo workflow resta solo avviabile a mano, come backup del .ics su GitHub.
on:
  workflow_dispatch:        # solo avvio manuale dal sito GitHub

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Genera bagnature.ics
        run: python generate.py
      - name: Commit se cambiato
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add bagnature.ics
          git diff --staged --quiet || git commit -m "Aggiorna calendario $(date -u +%F)"
          git push
